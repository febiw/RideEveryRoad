name: Stage changes in PR before deploying

on:
  pull_request:
    types: [opened, synchronize]

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STRAVA_CLIENT_ID: ${{ secrets.STRAVA_API_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_API_CLIENT_SECRET }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}