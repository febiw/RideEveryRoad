name: Build and deploy to Azure webapp

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: RideEveryRoad
  NODE_VERSION: '20.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STRAVA_CLIENT_ID: ${{ secrets.STRAVA_API_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_API_CLIENT_SECRET }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      - name: Archive build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: standalone
          path: |
            .next/standalone
            .next/static
            public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: standalone
      - name: 'Deploy to Azure WebApp'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone